# =============================================================================
# VoiceBot Default Settings
# =============================================================================
# Cấu hình mặc định cho ứng dụng VoiceBot
# Chỉnh sửa file này để thay đổi các thông số mặc định
# =============================================================================

theme:
  # [light, dark, system]: Chế độ sáng/tối mặc định của app.
  mode: system
  # [neutral, green, lime]: Bảng màu mặc định.
  palette: green
  # [0.85..1.5]: Tỉ lệ phóng chữ toàn app.
  text_scale: 1.5

logging:
  # [true, false]: Bật/tắt verbose logging (debug logs).
  verbose: false
  # [true, false]: Log audio events (frame sends, playback).
  log_audio: false
  # [true, false]: Log MCP tool calls.
  log_mcp: false
  # [true, false]: Log WebSocket messages.
  log_websocket: false
  # [true, false]: Log network requests.
  log_network: false

audio:
  # [true, false]: Bật/tắt VAD (Voice Activity Detection).
  vad_enabled: false
  # [0..1000]: Ngưỡng VAD (âm lượng tối thiểu).
  vad_threshold: 500
  # [1..10]: Số frame tối thiểu trong buffer.
  min_buffer_frames: 3
  # [1..20]: Số frame tối đa trong buffer.
  max_buffer_frames: 10

app:
  # [true, false]: Chế độ full screen.
  fullscreen_enabled: true
  # [true, false]: Bật kiểm tra/yêu cầu quyền.
  permissions_enabled: true
  # [true, false]: Bật tính năng auth.
  auth_enabled: false
  # [true, false]: Sử dụng flow mới (v2).
  use_new_flow: true

github:
  # [true, false]: Bật tự động kiểm tra update.
  auto_update_enabled: true
  # [string]: Tên owner repo GitHub.
  owner: "baolongdev"
  # [string]: Tên repo GitHub.
  repo: "voicebot"
  # [string]: Tên file asset chứa .apk.
  asset_extension: ".apk"

web_host:
  # [1..500]: Kích thước upload tối đa (MB).
  image_upload_max_mb: 100

chat:
  # [always_on, auto_stop, manual]: Chế độ nghe mặc định.
  listening_mode: auto_stop
  # [listen_detect, text]: Cách gửi text trong chat.
  text_send_mode: listen_detect
  # [string]: Câu gửi khi vừa kết nối chat.
  connect_greeting: "Xin chào"
  # [true, false]: Tự reconnect khi mất kết nối.
  auto_reconnect: true
  # [true, false]: Trạng thái mặc định của related images lúc khởi động app.
  # Có thể được người dùng bật/tắt lại ngay trong màn chat.
  related_images_enabled: true
  # [1..10]: Số related images tối đa.
  related_images_max_count: 4
  # [1..10]: Số images search top k.
  related_images_search_top_k: 3
  # [true, false]: Bật animation cho related images.
  related_images_animation_enabled: true

home:
  # [1..20]: Số carousel images tối đa.
  carousel_max_images: 8

camera:
  # [true, false]: Bật/tắt camera overlay.
  enabled: true
  # [0.5..3.0]: Tỉ lệ khung hình camera.
  aspect_ratio: 1.3333333333
  # [true, false]: Bật/tắt phát hiện khuôn mặt.
  detect_faces: true
  # [true, false]: Bật/tắt landmarks.
  face_landmarks: false
  # [true, false]: Bật/tắt face mesh.
  face_mesh: false
  # [true, false]: Bật/tắt eye tracking.
  eye_tracking: false

carousel:
  # [120..360]: Chiều cao carousel (dp).
  height: 240.0
  # [true, false]: Tự động chuyển ảnh.
  auto_play: true
  # [1000..10000]: Chu kỳ auto play (ms).
  auto_play_interval_ms: 4000
  # [200..3000]: Thời gian animation (ms).
  animation_duration_ms: 700
  # [0.4..1.0]: Tỉ lệ chiều rộng item trong viewport.
  viewport_fraction: 0.7
  # [true, false]: Phóng to item ở giữa.
  enlarge_center: true

device:
  # [MAC string]: MAC mặc định cho OTA/device identity.
  default_mac_address: "02:00:00:00:00:16"
